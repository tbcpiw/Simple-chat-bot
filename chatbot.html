<!DOCTYPE html>
<html>
  <head>
    <title>Chat-Bot</title>
    <style>

      body {
        font-family: Arial;
      }

      .send-button {
        background-color: green;
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chat-input {
        padding: 20x 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;

        flex-grow: 1;
      }
      .chat-input-container {
        display: flex;

      }
      .app-container {
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
      }
      .chat-message-user {
        display: flex;
        justify-content: end;
        align-items: start
      }
      .chat-message-robot {
        display: flex;
        align-items: start
      }
      .chat-message-text {
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }
      .chat-message-profile {
        width: 45px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script> 
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script> <!-- this and previous line of code are external libraries to set up react-->

    <script src = "https://unpkg.com/supersimpledev/dayjs.js"></script> <!-- uploading library to get the time info-->

    <script src = "https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script> <!-- set-up babel to translate JSX to JS -->
    <script type="text/babel"> 
        function ChatInput({ chatMessages, setChatMessages }) {

          const [inputText, setInputText] = React.useState('');
          function saveInputText(event) {
            setInputText(event.target.value);
          }

          function sendMessage() {
            const newChatMessages = [
              ...chatMessages, 
              {
                message: inputText,
                sender: 'user', 
                id: crypto.randomUUID()
              }
            ];


            setChatMessages(newChatMessages);

            const response = Chatbot.getResponse(inputText);
            setChatMessages([
              ...newChatMessages, 
              {
                message: response,
                sender: 'robot', 
                id: crypto.randomUUID()
              }
            ])

            setInputText('');
          }
          function ente() {
            console.log(event.key)
            if ( event.key === "Enter" )
            {
              sendMessage()
            }
            else if ( event.key == "Escape" )
            {
              setInputText('')
            }
          }
          return (
            <div className = "chat-input-container">
              <input 
                placeholder = "send message to chatbot" 
                size = "30"
                onChange = {saveInputText}
                value = {inputText}
                onKeyDown = {ente}
                className = "chat-input"
              />
              <button
                onClick = {sendMessage}
                className = "send-button"
              >Send</button>
            </div>

          );
        }

        function ChatMessage( {message, sender} ) {
          // const { message, sender } = props; // "same as message = props.message" -->
          // const { sender } = props;

          /*
          if ( sender == "robot" ) {
            return (
              <div>
                <img src = "assets/robot.png" width = "50"/>
                {message}
              </div>
            );
          }
          */

          return (
            <div className = {sender == "user" ? 'chat-message-user' : 'chat-message-robot'}>
              {sender == "robot" &&  (
                <img src = "assets/robot.png"
                className = "chat-message-profile" />
              )}
              <div className = "chat-message-text">
                {message}
              </div>
              {sender == "user" && (
                <img src = "assets/user.png" 
                className = "chat-message-profile" />
              )}
            </div>
          );
        }

        function ChatMessages({ chatMessages }) {

          const chatMessagesRef = React.useRef(null);
          React.useEffect(() => {
            const containerElem = chatMessagesRef.current;
            if ( containerElem ) {
              containerElem.scrollTop = containerElem.scrollHeight;
               
            }
          }, [chatMessages]);
          return (
            <div className = "chat-messages-container"
            ref = {chatMessagesRef}  >
              {chatMessages.map((msg, index) => {
                return (
                  <ChatMessage 
                    key = {msg.id}
                    message = {msg.message}
                    sender = {msg.sender}
                  /> 
                )
              })}
            </div>
          );
        }

        function App() {
          const array = React.useState( [{
            message: 'hello Chatbot',
            sender: 'user',
            id: "1"
          }, {
            message: 'Hello, How can I help u?', 
            sender: 'robot',
            id: "2"
          }]);
          const [chatMessages, setChatMessages] = array;  // this is array destructuring
          // const chatMessages = array[0];
          // const setChatMessages = array[1]; 

          return (
          <div className = "app-container">
            
            <ChatInput 
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
            <ChatMessages 
              chatMessages = {chatMessages}
            />
            
          </div>
          );
        }

        const container = document.querySelector('.js-container');
        const root = ReactDOM.createRoot(container);
        root.render(<App />)
    </script>


  </body>
</html>
